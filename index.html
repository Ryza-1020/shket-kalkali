<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקט כלכלי – פורטל לקוחות</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3a5c;--blue-mid:#2563a8;--teal:#0d9488;--teal-light:#14b8a6;
  --teal-bg:#f0fdfa;--gray:#f8fafc;--gray2:#f1f5f9;--gray3:#e2e8f0;
  --gray4:#94a3b8;--gray5:#64748b;--text:#1e293b;--text2:#475569;--white:#ffffff;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --radius:12px;--radius-lg:18px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray);color:var(--text);min-height:100vh;direction:rtl}
.hidden{display:none!important}
#login-screen{min-height:100vh;background:linear-gradient(135deg,var(--blue) 0%,#0f4c81 50%,var(--teal) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-circle{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:36px;border:2px solid rgba(255,255,255,0.3)}
.login-logo h1{color:#fff;font-size:26px;font-weight:700;letter-spacing:-0.5px}
.login-logo p{color:rgba(255,255,255,0.75);font-size:14px;margin-top:4px}
.login-card{background:#fff;border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.login-tabs{display:flex;gap:4px;background:var(--gray2);border-radius:10px;padding:4px;margin-bottom:24px}
.login-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s;color:var(--gray5);font-weight:500;border:none;background:transparent;font-family:inherit}
.login-tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.field-label{font-size:13px;color:var(--gray5);font-weight:600;margin-bottom:6px;display:block}
.field-input{width:100%;padding:12px 14px;border:1.5px solid var(--gray3);border-radius:10px;font-size:15px;color:var(--text);outline:none;transition:border 0.2s;background:#fff;font-family:inherit;direction:rtl}
.field-input:focus{border-color:var(--teal)}
.pin-row{display:flex;gap:10px;justify-content:center;margin:8px 0}
.pin-digit{width:56px;height:64px;border:2px solid var(--gray3);border-radius:12px;font-size:28px;text-align:center;font-weight:700;color:var(--blue);outline:none;transition:border 0.2s;direction:ltr}
.pin-digit:focus{border-color:var(--teal)}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--blue-mid));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.2s;font-family:inherit;margin-top:8px}
.btn-primary:hover{opacity:0.92}
.login-footer{text-align:center;margin-top:16px;font-size:13px;color:var(--gray4)}
.field-group{margin-bottom:18px}
.advisor-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-bg);color:var(--teal);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:20px}
#app-shell{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative}
.top-bar{background:var(--white);border-bottom:1px solid var(--gray3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar-logo{font-size:17px;font-weight:700;color:var(--blue);letter-spacing:-0.3px}
.top-bar-logo span{color:var(--teal)}
.top-bar-right{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue-mid));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.notif-btn{width:36px;height:36px;border-radius:50%;background:var(--gray2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:18px;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid #fff}
.page-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.bottom-nav{position:fixed;bottom:0;right:0;left:0;width:100%;background:#fff;border-top:1px solid var(--gray3);display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;cursor:pointer;border:none;background:transparent;color:var(--gray4);transition:color 0.2s;min-width:48px;font-family:inherit}
.nav-item.active{color:var(--teal)}
.nav-item .nav-icon{font-size:22px;line-height:1}
.nav-item .nav-label{font-size:10px;font-weight:600}
.card{background:#fff;border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px}
.section-sub{font-size:13px;color:var(--gray5);margin-top:2px;font-weight:400}
.greeting{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.greeting-sub{font-size:14px;color:var(--gray5);margin-bottom:20px}
.score-card{background:linear-gradient(135deg,var(--blue) 0%,#1a5fa8 50%,var(--teal) 100%);border-radius:var(--radius-lg);padding:28px 20px;text-align:center;box-shadow:0 8px 32px rgba(26,58,92,0.35);margin-bottom:14px;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.05)}
.score-label{color:rgba(255,255,255,0.8);font-size:13px;font-weight:600;margin-bottom:12px;letter-spacing:0.5px}
.score-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 14px;position:relative;display:flex;align-items:center;justify-content:center}
.score-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.score-number{font-size:44px;font-weight:800;color:#fff;line-height:1;position:relative;z-index:1}
.score-number sup{font-size:18px;font-weight:600;vertical-align:super}
.score-tag{display:inline-block;background:rgba(255,255,255,0.15);color:#fff;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.3);margin-bottom:14px}
.score-factors{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.score-factor{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,0.2)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-right:3px solid var(--teal)}
.kpi-card.neg{border-right-color:#ef4444}
.kpi-card.warn{border-right-color:#f59e0b}
.kpi-label{font-size:11px;color:var(--gray5);font-weight:600;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:800;color:var(--text)}
.kpi-icon{font-size:20px;margin-bottom:6px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);margin-bottom:8px}
.alert.warn{background:#fffbeb;border:1px solid #fcd34d}
.alert.info{background:#eff6ff;border:1px solid #93c5fd}
.alert.success{background:#f0fdf4;border:1px solid #86efac}
.alert.danger{background:#fef2f2;border:1px solid #fca5a5}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-text{font-size:13px;color:var(--text2);flex:1}
.alert-text strong{color:var(--text);font-weight:700}
.chart-wrap{position:relative;height:180px}
.pie-wrap{position:relative;height:200px}
.pie-legend{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.insight-card{background:#fff;border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border-top:4px solid var(--teal)}
.insight-card.warn{border-top-color:#f59e0b}
.insight-card.danger{border-top-color:#ef4444}
.insight-card.success{border-top-color:#22c55e}
.insight-card.info{border-top-color:#3b82f6}
.insight-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.insight-icon{font-size:24px}
.insight-title{font-size:15px;font-weight:700;color:var(--text)}
.insight-priority{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;margin-right:auto}
.priority-high{background:#fef2f2;color:#dc2626}
.priority-med{background:#fffbeb;color:#d97706}
.priority-low{background:#f0fdf4;color:#16a34a}
.insight-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.insight-rec{background:var(--gray2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:6px}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 130px)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 0}
.chat-msg{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px}
.chat-msg.user{flex-direction:row-reverse}
.chat-bubble{max-width:80%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.5}
.chat-msg.ai .chat-bubble{background:#fff;box-shadow:var(--shadow);border-bottom-right-radius:4px;color:var(--text)}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--teal),var(--blue-mid));color:#fff;border-bottom-left-radius:4px}
.chat-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.ai-avatar{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-size:13px;font-weight:700}
.user-avatar-chat{background:var(--gray3)}
.chat-input-wrap{background:#fff;border-top:1px solid var(--gray3);padding:12px;display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;border:1.5px solid var(--gray3);border-radius:24px;padding:10px 16px;font-size:14px;resize:none;font-family:inherit;outline:none;max-height:100px;direction:rtl;transition:border 0.2s}
.chat-input:focus{border-color:var(--teal)}
.chat-send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue-mid));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.quick-chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 4px}
.chip{padding:6px 12px;background:var(--gray2);border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--gray3);color:var(--text2);transition:all 0.2s;white-space:nowrap}
.chip:hover{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.typing-dots{display:flex;gap:4px;align-items:center;padding:12px 15px;background:#fff;border-radius:18px;box-shadow:var(--shadow)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gray4);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.upload-zone{border:2px dashed var(--gray3);border-radius:var(--radius-lg);padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px;background:var(--gray2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:var(--teal-bg)}
.doc-item{background:#fff;border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);margin-bottom:8px}
.doc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.doc-meta{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-info{font-size:12px;color:var(--gray5);margin-top:2px}
.doc-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700;flex-shrink:0}
.status-done{background:#dcfce7;color:#16a34a}
.status-proc{background:#fef9c3;color:#a16207}
.budget-table{width:100%;border-collapse:collapse}
.budget-table th{font-size:12px;color:var(--gray5);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--gray3);text-align:right}
.budget-table td{font-size:13px;padding:10px 10px;border-bottom:1px solid var(--gray3);vertical-align:middle}
.budget-bar-wrap{height:6px;background:var(--gray3);border-radius:3px;overflow:hidden;width:60px}
.budget-bar{height:100%;border-radius:3px;transition:width 0.5s}
.budget-bar.ok{background:var(--teal)}.budget-bar.warn{background:#f59e0b}.budget-bar.over{background:#ef4444}
.diff-pos{color:#16a34a;font-weight:700}.diff-neg{color:#ef4444;font-weight:700}
.goal-card{background:#fff;border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.goal-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.goal-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.goal-meta{flex:1}
.goal-name{font-size:15px;font-weight:700;color:var(--text)}
.goal-date{font-size:12px;color:var(--gray5);margin-top:2px}
.goal-pct{font-size:18px;font-weight:800;color:var(--teal)}
.progress-bar-bg{height:10px;background:var(--gray3);border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal),var(--blue-mid));transition:width 0.8s}
.goal-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--gray5);margin-top:5px}
.goal-amounts strong{color:var(--text);font-weight:700}
.asset-item{background:#fff;border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);margin-bottom:8px}
.asset-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.asset-meta{flex:1;min-width:0}
.asset-name{font-size:14px;font-weight:600;color:var(--text)}
.asset-detail{font-size:12px;color:var(--gray5);margin-top:2px}
.asset-value{font-size:16px;font-weight:800;color:var(--teal);text-align:left;flex-shrink:0}
.asset-value small{display:block;font-size:10px;color:var(--gray5);font-weight:400;text-align:left}
.asset-value.neg{color:#ef4444}
.msg-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray3)}
.msg-item:last-child{border-bottom:none}
.msg-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.msg-content{flex:1}
.msg-name{font-size:13px;font-weight:700;color:var(--text)}
.msg-text{font-size:13px;color:var(--text2);margin-top:2px}
.msg-time{font-size:11px;color:var(--gray4);margin-top:2px}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray3)}
.task-item:last-child{border-bottom:none}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--gray3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.task-check.done{background:var(--teal);border-color:var(--teal);color:#fff}
.task-text{font-size:14px;color:var(--text);flex:1}
.task-text.done{text-decoration:line-through;color:var(--gray4)}
.task-prio{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0}
.prio-h{background:#fee2e2;color:#dc2626}.prio-m{background:#fef9c3;color:#a16207}.prio-l{background:#dcfce7;color:#16a34a}
.help-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray3)}
.help-step:last-child{border-bottom:none}
.help-num{width:32px;height:32px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.help-content h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.help-content p{font-size:13px;color:var(--text2);line-height:1.5}
#admin-shell{min-height:100vh;background:var(--gray)}
.admin-sidebar{background:var(--blue);color:#fff;padding:20px;display:flex;flex-direction:column;gap:4px}
.admin-logo{font-size:18px;font-weight:800;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.15)}
.admin-logo span{color:var(--teal-light)}
.admin-tab{padding:10px 12px;border-radius:10px;font-size:14px;cursor:pointer;color:rgba(255,255,255,0.75);transition:all 0.2s;display:flex;align-items:center;gap:8px;border:none;background:transparent;font-family:inherit;text-align:right;width:100%}
.admin-tab:hover{background:rgba(255,255,255,0.1);color:#fff}
.admin-tab.active{background:rgba(20,184,166,0.25);color:#fff;font-weight:600}
.admin-main{flex:1;padding:24px;overflow-y:auto}
.btn-new{background:linear-gradient(135deg,var(--teal),var(--blue-mid));color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.family-card-admin{background:#fff;border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;gap:14px;border:1.5px solid transparent}
.family-avatar-big{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.family-info{flex:1}
.family-name{font-size:16px;font-weight:700;color:var(--text)}
.family-sub{font-size:13px;color:var(--gray5);margin-top:2px}
.family-score-num{font-size:22px;font-weight:800;color:var(--teal)}
.family-score-label{font-size:10px;color:var(--gray4);font-weight:600}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;display:inline-block;margin-top:4px}
.badge-active{background:#dcfce7;color:#16a34a}
.badge-inactive{background:#f1f5f9;color:#64748b}
.badge-new{background:#eff6ff;color:#1d4ed8}
.admin-stat{background:#fff;border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow);text-align:center}
.admin-stat-num{font-size:30px;font-weight:800;color:var(--blue)}
.admin-stat-label{font-size:12px;color:var(--gray5);font-weight:600;margin-top:4px}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--gray3);border-radius:12px;padding:10px 14px;margin-bottom:14px}
.search-bar input{border:none;outline:none;flex:1;font-size:14px;font-family:inherit;direction:rtl}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:24px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--gray3);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:var(--shadow-lg);display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.tab-content{animation:fadeIn 0.2s ease}
@media(min-width:768px){
  #app-shell{max-width:1100px;margin:0 auto}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .page-content{padding:24px 32px 100px}
  #admin-shell{display:flex}
  .admin-sidebar{width:220px;min-height:100vh;flex-shrink:0}

function loadDB(){
  try{
    const r=localStorage.getItem(DB_KEY);
    const db=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_DB));
    if(!db.families.some(f=>f.id==='fam_demo')){
      db.families.unshift(JSON.parse(JSON.stringify(DEFAULT_DB.families[0])));
    }
    return db;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_DB));}
}
let _saveCount=0;
function saveDB(db){
  try{
    localStorage.setItem(DB_KEY,JSON.stringify(db));
    _saveCount++;
    if(_saveCount%5===0){
      const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
      localStorage.setItem(DB_KEY+'_auto_'+ts,JSON.stringify(db));
    }
  }catch(e){console.error('saveDB:',e);}
}

// ── SCORE RING ────────────────────────────────────────────────────────────────
function scoreRingSVG(score){
  const r=54,cx=65,cy=65,circ=2*Math.PI*r;
  const dash=circ*(score/100),gap=circ-dash;
  return `<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="10"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/></svg>`;
}

      <div class="score-tag">${score>=80?'מצוין 🏆':score>=65?'טוב 📈':score>=50?'סביר 💪':score>0?'זקוק לשיפור ⚠️':'ממתין לנתונים...'}</div>

function buildInsights(){
  const f=currentFamily;
  const kpi=f.kpi||{};
  const income=kpi.income||0,expense=kpi.expense||0,cashflow=kpi.cashflow||0;
  if(!income&&!expense){
    document.getElementById('page-insights').innerHTML=`<div class="section-title">תובנות AI</div><div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:12px">🤖</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">אין עדיין נתונים לניתוח</div><div style="font-size:13px;color:var(--gray5);margin-bottom:16px">העלה מסמכים פיננסיים לקבלת תובנות אישיות</div><button onclick="showPage('docs')" class="btn-primary" style="margin:0;max-width:220px">📤 העלה מסמכים</button></div>`;
    return;
  }
  const savingRate=income>0?Math.round((cashflow/income)*100):0;
  const insights=[];
  if(cashflow<0) insights.push({type:'danger',icon:'🚨',title:'תזרים שלילי',priority:'high',body:`ההוצאות (${expense.toLocaleString('he-IL')} ₪) עולות על ההכנסות ב-${Math.abs(cashflow).toLocaleString('he-IL')} ₪.`,rec:'יש לצמצם הוצאות מיידית. בדקו את קטגוריות ההוצאות הגדולות.'});
  else if(savingRate<10) insights.push({type:'warn',icon:'⚠️',title:'שיעור חיסכון נמוך',priority:'med',body:`חיסכון של ${savingRate}% בלבד (${cashflow.toLocaleString('he-IL')} ₪/חודש). הנורמה המומלצת: לפחות 20%.`,rec:`יעד חיסכון: ${Math.round(income*0.2).toLocaleString('he-IL')} ₪/חודש.`});
  else insights.push({type:'success',icon:'✅',title:'שיעור חיסכון טוב',priority:'low',body:`חיסכון של ${savingRate}% (${cashflow.toLocaleString('he-IL')} ₪/חודש) — ${(cashflow*12).toLocaleString('he-IL')} ₪ בשנה.`,rec:'שקלו להשקיע חלק בקרן השתלמות או מכשיר פיננסי מניב.'});
  const overBudget=(f.budget||[]).filter(r=>r.actual>r.budgetGoal&&r.budgetGoal>0);
  if(overBudget.length>0) insights.push({type:'warn',icon:'📊',title:'חריגות תקציב',priority:'med',body:`${overBudget.length} קטגוריות בחריגה: ${overBudget.map(r=>r.cat).join(', ')}.`,rec:'בדקו אפשרויות לצמצום בקטגוריות החורגות.'});
  document.getElementById('page-insights').innerHTML=`<p class="section-title">תובנות <span class="section-sub">מבוסס על הנתונים שלך</span></p>${insights.map(i=>`<div class="insight-card ${i.type}"><div class="insight-header"><span class="insight-icon">${i.icon}</span><div class="insight-title">${i.title}</div><span class="insight-priority priority-${i.priority==='high'?'high':i.priority==='med'?'med':'low'}">${i.priority==='high'?'דחוף':i.priority==='med'?'בינוני':'נמוך'}</span></div><div class="insight-body">${i.body}</div><div class="insight-rec">💡 ${i.rec}</div></div>`).join('')}`;
}

function renderChat(){
  return chatHistory.map(m=>`<div class="chat-msg ${m.role==='user'?'user':'ai'}">${m.role==='ai'?'<div class="chat-avatar ai-avatar">AI</div>':''}<div class="chat-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div>${m.role==='user'?'<div class="chat-avatar user-avatar-chat">👤</div>':''}</div>`).join('');
}

function processAICommand(text){
  const f=currentFamily;
  const goalMatch=text.match(/(?:הגדר|תגדיר|הוסף|תוסיף)[^0-9]*([\d,]+)/);
  if(goalMatch&&(text.includes('יעד')||text.includes('חיסכון'))){
    const amount=parseInt(goalMatch[1].replace(/,/g,''));
    const name=text.replace(/(?:הגדר|תגדיר|הוסף|תוסיף)\s*/,'').replace(/יעד\s*/,'').replace(/של\s*/,'').replace(/[\d,]+\s*₪?/,'').trim()||'יעד חדש';
    if(amount>0){f.goals.push({name,icon:'🎯',bg:'#fdf4ff',target:amount,current:0,date:'?'});saveDB(DB);buildGoals();return `✅ יעד "${name}" של ${amount.toLocaleString('he-IL')} ₪ נוסף!`;}
  }
  const budgetMatch=text.match(/(?:קבע|תקבע|עדכן|תעדכן)\s+תקציב\s+(\S+)\s+([\d,]+)/);
  if(budgetMatch){
    const cat=budgetMatch[1],amount=parseInt(budgetMatch[2].replace(/,/g,''));
    if(amount>0){const row=f.budget.find(r=>r.cat===cat||r.cat.includes(cat));
      if(row){row.budgetGoal=amount;saveDB(DB);buildBudget();return `✅ תקציב ${cat} עודכן ל-${amount.toLocaleString('he-IL')} ₪`;}
      f.budget.push({cat,budgetGoal:amount,actual:0});saveDB(DB);buildBudget();return `✅ תקציב ${cat}: ${amount.toLocaleString('he-IL')} ₪`;}
  }
  return null;
}

function buildAI(){
  document.getElementById('page-ai').innerHTML=`<div class="chat-container"><div class="chat-messages" id="chat-messages">${renderChat()}</div><div class="quick-chips"><div class="chip" onclick="document.getElementById('chat-input').value='מה המצב הפיננסי שלנו?';submitChat()">📊 מצב כללי</div><div class="chip" onclick="document.getElementById('chat-input').value='איפה אפשר לחסוך?';submitChat()">💡 חיסכון</div><div class="chip" onclick="document.getElementById('chat-input').value='מה הציון שלנו?';submitChat()">🎯 ציון</div><div class="chip" onclick="document.getElementById('chat-input').value='איך לשפר את התזרים?';submitChat()">💰 תזרים</div></div><div class="chat-input-wrap"><textarea class="chat-input" id="chat-input" placeholder="שאל/י שאלה כלכלית..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitChat();}"></textarea><button class="chat-send" onclick="submitChat()">➤</button></div></div>`;
  scrollChat();
}

async function submitChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;
  chatHistory.push({role:'user',text});
  inp.value='';inp.style.height='auto';
  const msgs=document.getElementById('chat-messages');
  msgs.innerHTML=renderChat()+'<div class="chat-msg ai"><div class="chat-avatar ai-avatar">AI</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  scrollChat();
  // Try local action commands first
  const localResult=processAICommand(text);
  if(localResult&&localResult.startsWith('✅')){
    chatHistory.push({role:'ai',text:localResult});
    msgs.innerHTML=renderChat();scrollChat();return;
  }
  // Send to Claude with full financial context
  const reply=await sendChatToClaude(text);
  chatHistory.push({role:'ai',text:reply||'מצטער, לא הצלחתי לענות. נסה שוב.'});
  msgs.innerHTML=renderChat();scrollChat();
}

async function sendChatToClaude(userMsg){
  const f=currentFamily;
  const fmt=n=>n!=null?Number(n).toLocaleString('he-IL'):'—';
  const kpi=f.kpi||{};
  const docs=(f.docs||[]).filter(d=>d.aiType&&d.aiType!=='other');
  const typeLabel={salary:'תלוש שכר',bank:'תדפיס בנק',credit:'כרטיס אשראי',mortgage:'משכנתא',loan:'הלוואה',saving:'חיסכון/קרן'};
  const systemPrompt=`אתה יועץ פיננסי אישי חכם ואמפתי בשם "שקט כלכלי". אתה מדבר עברית בלבד, בשפה ידידותית וברורה. אתה מכיר את הנתונים הפיננסיים של המשפחה ועוזר להם להבין את המצב ולקבל החלטות חכמות.

נתוני משפחת ${f.name}:
- הכנסה חודשית: ${fmt(kpi.income)} ₪
- הוצאה חודשית (אשראי): ${fmt(kpi.expense)} ₪
- תזרים חודשי: ${fmt(kpi.cashflow)} ₪
- ציון שקט כלכלי: ${f.score||0}/100

מסמכים שנותחו:
${docs.map(d=>`• ${typeLabel[d.aiType]}: ${d.aiIncome?'הכנסה '+fmt(d.aiIncome)+' ₪':''}${d.aiExpense?' הוצאה '+fmt(d.aiExpense)+' ₪':''}${d.aiBalance?' יתרה '+fmt(d.aiBalance)+' ₪':''} — ${d.aiSummary||d.name}`).join('\n')||'• אין מסמכים מנותחים עדיין'}

${f.categories&&f.categories.length?'פירוט הוצאות לפי קטגוריה:\n'+f.categories.map(c=>`• ${c.label}: ${fmt(c.value)} ₪`).join('\n'):''}

${f.budget&&f.budget.length?'תקציב מוגדר:\n'+f.budget.map(r=>`• ${r.cat}: יעד ${fmt(r.budgetGoal)} ₪, בפועל ${r.actual>0?fmt(r.actual)+' ₪':'לא ידוע'}`).join('\n'):''}

${f.goals&&f.goals.length?'יעדים פיננסיים:\n'+f.goals.map(g=>`• ${g.name}: ${fmt(g.current)} ₪ מתוך ${fmt(g.target)} ₪ (${Math.round(g.current/g.target*100)}%)`).join('\n'):''}

${f.assets&&f.assets.length?'נכסים:\n'+f.assets.map(a=>`• ${a.name}: ${fmt(a.value)} ₪`).join('\n'):''}

הנחיות: ענה בצורה ממוקדת ומעשית. השתמש בנתונים האמיתיים לעיל. אם אין לך מספיק נתונים — אמור זאת ישר. אל תמציא מספרים. אפשר להמליץ על פעולות ספציפיות. הגבל ל-3-4 משפטים אלא אם נדרש ניתוח מעמיק.`;

  try{
    const res=await fetch('/api/claude',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
      },
      body:JSON.stringify({
        model:'claude-opus-4-8',
        max_tokens:1024,
        system:systemPrompt,
        messages:[{role:'user',content:userMsg}]
      })
    });
    const json=await res.json();
    if(json.error) return 'שגיאה: '+json.error.message;
    return json?.content?.[0]?.text||null;
  }catch(e){return 'שגיאת תקשורת: '+e.message;}
}

function applyDocsAnalysis(){
  const f=currentFamily;
  let totalIncome=f.kpi.income||0;
  let totalExpense=f.kpi.expense||0;
  let hasData=false;

  pendingDocs.forEach((d,i)=>{
    const type=document.getElementById(`pd-type-${i}`)?.value||d.det.type;
    const amt=parseInt(document.getElementById(`pd-amt-${i}`)?.value)||0;
    if(!amt) return;
    hasData=true;
    if(type==='salary') totalIncome+=amt;
    else if(type==='bank') { if(amt>totalIncome) totalIncome=amt; }
    else if(type==='credit') totalExpense+=amt;
    else if(type==='mortgage') {
      f.assets=f.assets.filter(a=>a.type!=='mortgage');
      f.assets.push({name:'משכנתא',icon:'🏠',bg:'#fef2f2',value:-amt,detail:'מתדפיס שהועלה',type:'mortgage'});
      totalExpense+=amt;
    }
    else if(type==='loan') {
      f.assets.push({name:'הלוואה',icon:'📋',bg:'#fffbeb',value:-amt,detail:'מתדפיס שהועלה',type:'loan'});
      totalExpense+=amt;
    }
    else if(type==='saving') f.assets.push({name:'חיסכון',icon:'📈',bg:'#f0fdf4',value:amt,detail:'מתדפיס שהועלה',type:'saving'});
    else totalIncome+=amt;
  });

  if(!hasData){showToast('נא להזין לפחות סכום אחד');return;}

  if(totalIncome>0) f.kpi.income=totalIncome;
  if(totalExpense>0) f.kpi.expense=totalExpense;
  if(totalIncome>0&&totalExpense>0){
    f.kpi.cashflow=totalIncome-totalExpense;
    f.kpi.balance=Math.round(f.kpi.cashflow*12);
  }

  if(f.budget.length===0&&totalExpense>0){
    const e=totalExpense;
    f.budget=[
      {cat:'דיור',budgetGoal:Math.round(e*.35),actual:Math.round(e*.35)},
      {cat:'מזון',budgetGoal:Math.round(e*.18),actual:Math.round(e*.18)},
      {cat:'תחבורה',budgetGoal:Math.round(e*.12),actual:Math.round(e*.11)},
      {cat:'חינוך',budgetGoal:Math.round(e*.10),actual:Math.round(e*.10)},
      {cat:'בריאות',budgetGoal:Math.round(e*.06),actual:Math.round(e*.06)},
      {cat:'הלוואות',budgetGoal:Math.round(e*.10),actual:Math.round(e*.10)},
      {cat:'בילויים',budgetGoal:Math.round(e*.06),actual:Math.round(e*.05)},
      {cat:'אחר',budgetGoal:Math.round(e*.03),actual:Math.round(e*.05)},
    ];
    f.categories=f.budget.map((b,idx)=>({label:b.cat,value:b.actual,
      color:['#1a3a5c','#0d9488','#f59e0b','#8b5cf6','#ec4899','#ef4444','#06b6d4','#94a3b8'][idx]}));
  }

  if((!f.months||!f.months.length)&&totalIncome>0){
    f.months=['יול','אוג','ספט','אוק','נוב','דצמ','ינו','פבר','מרץ','אפר','מאי','יונ'];
    f.incomes=f.months.map(()=>Math.round(totalIncome*(0.95+Math.random()*.1)));
    f.expenses=f.months.map(()=>Math.round(totalExpense*(0.93+Math.random()*.1)));
  }

  if(totalIncome>0){
    const r=(totalIncome-totalExpense)/totalIncome;
    f.score=Math.min(100,Math.max(10,Math.round(50+r*120)));
  }

  f.docs.forEach(d=>{if(d.status==='proc')d.status='done';});
  pendingDocs=[];
  saveDB(DB);
  showToast('✅ הדשבורד עודכן בהצלחה!');
  setTimeout(()=>showPage('home'),500);
}

function detectDocType(name){
  const n=name.toLowerCase();
  if(/בנק|bank|leumi|poalim|discount|mizrahi|hapoalim|otzar|יהב|מרכנתיל/.test(n)) return {type:'bank',icon:'🏦',label:'תדפיס בנק'};
  if(/visa|master|cal|max|isracard|כרטיס|אשראי|credit/.test(n))                   return {type:'credit',icon:'💳',label:'כרטיס אשראי'};
  if(/תלוש|שכר|salary|payslip|משכורת/.test(n))                                   return {type:'salary',icon:'💰',label:'תלוש שכר'};
  if(/משכנתא|mortgage/.test(n))                                                   return {type:'mortgage',icon:'🏠',label:'משכנתא'};
  if(/הלוואה|loan|credit(?!.card)/.test(n))                                       return {type:'loan',icon:'📋',label:'הלוואה'};
  if(/השתלמות|גמל|pension|פנסיה|קרן/.test(n))                                    return {type:'saving',icon:'📈',label:'חיסכון / קרן'};
  if(/\.csv$|\.xlsx?$/.test(n))                                                   return {type:'csv',icon:'📊',label:'קובץ נתונים'};
  return {type:'other',icon:'📄',label:'מסמך כללי'};
}

// ── TRY TO READ TEXT FROM FILE (CSV/TXT) ─────────────────────────────────────
function readFileText(file){
  return new Promise(resolve=>{
    if(file.size>2*1024*1024){resolve(null);return;}
    const ext=file.name.split('.').pop().toLowerCase();
    if(['csv','txt'].includes(ext)){
      const r=new FileReader();
      r.onload=e=>resolve(e.target.result);
      r.onerror=()=>resolve(null);
      r.readAsText(file,'UTF-8');
    } else {resolve(null);}
  });
}

// ── EXTRACT NUMBERS FROM TEXT ─────────────────────────────────────────────────
function extractNumbersFromText(text){
  if(!text) return {};
  const nums=[];
  const lines=text.split(/\r?\n/);
  lines.forEach(line=>{
    const matches=line.match(/[\d,]+\.?\d*/g)||[];
    matches.forEach(m=>{const n=parseFloat(m.replace(/,/g,''));if(n>100&&n<500000)nums.push(n);});
  });
  nums.sort((a,b)=>b-a);
  return {topValues:nums.slice(0,10),total:nums.reduce((s,n)=>s+n,0)};
}

async function fileToImageDataUrl(file){
  return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.onerror=()=>r(null);rd.readAsDataURL(file);});
}

async function pdfToText(file){
  try{
    if(!window.pdfjsLib) return null;
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='';
    const buf=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:buf,disableRange:true,disableStream:true,disableAutoFetch:true}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(s=>s.str).join(' ')+'\n';
      if(text.length>60000) break;
    }
    return text.trim().length>100?text.substring(0,60000):null;
  }catch(e){console.error('pdfToText error:',e);return null;}
}

async function pdfToImageDataUrl(file){
  try{
    if(!window.pdfjsLib) return null;
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='';
    const buf=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:buf,disableRange:true,disableStream:true,disableAutoFetch:true}).promise;
    const numPages=Math.min(pdf.numPages,3);
    const canvases=[];
    let totalHeight=0, maxWidth=0;
    for(let i=1;i<=numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:1.8});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width; canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      canvases.push(canvas);
      totalHeight+=vp.height;
      if(vp.width>maxWidth) maxWidth=vp.width;
    }
    const combined=document.createElement('canvas');
    combined.width=maxWidth; combined.height=totalHeight;
    const ctx=combined.getContext('2d');
    let y=0;
    for(const c of canvases){ctx.drawImage(c,0,y);y+=c.height;}
    return combined.toDataURL('image/jpeg',0.82);
  }catch(e){return null;}
}

async function wordToText(file){
  try{
    if(!window.mammoth) return null;
    const buf=await file.arrayBuffer();
    const res=await mammoth.extractRawText({arrayBuffer:buf});
    return res.value.substring(0,3000);
  }catch(e){return null;}
}

async function excelToText(file){
  try{
    if(!window.XLSX) return null;
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    return wb.SheetNames.map(n=>XLSX.utils.sheet_to_csv(wb.Sheets[n])).join('\n').substring(0,3000);
  }catch(e){return null;}
}

async function sendToClaude(content, isImage){
  try{
    const mediaType=isImage?(content.match(/^data:(image\/\w+);base64,/)||[])[1]||'image/jpeg':'image/jpeg';
    const msgContent=isImage
      ?[{type:'text',text:AI_PROMPT},{type:'image',source:{type:'base64',media_type:mediaType,data:content.replace(/^data:image\/\w+;base64,/,'')}}]
      :[{type:'text',text:AI_PROMPT+'\n\nתוכן המסמך:\n'+content}];
    const res=await fetch('/api/claude',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
      },
      body:JSON.stringify({model:'claude-opus-4-8',max_tokens:1024,messages:[{role:'user',content:msgContent}]})
    });
    const json=await res.json();
    if(json.error){showToast('❌ שגיאת AI: '+json.error.message);console.error('Claude error:',json.error);return null;}
    const text=json?.content?.[0]?.text||'';
    console.log('Claude response:',text);
    const match=text.match(/\{[\s\S]*\}/);
    if(!match){showToast('⚠️ AI לא החזיר JSON תקין');return null;}
    let jsonStr=match[0];
    try{return JSON.parse(jsonStr);}catch(e2){
      const t=(jsonStr.match(/"type"\s*:\s*"(\w+)"/)||[])[1]||'other';
      const inc=+(jsonStr.match(/"income"\s*:\s*(\d+)/)||[])[1]||null;
      const exp=+(jsonStr.match(/"expense"\s*:\s*(\d+)/)||[])[1]||null;
      const bal=+(jsonStr.match(/"balance"\s*:\s*(\d+)/)||[])[1]||null;
      return {type:t,income:inc,expense:exp,balance:bal,summary:''};
    }
  }catch(e){showToast('❌ שגיאה: '+e.message);console.error('sendToClaude error:',e);return null;}
}

async function analyzeWithAI(file){
  const name=file.name.toLowerCase();
  showToast('🤖 מנתח: '+file.name);
  if(/\.(jpg|jpeg|png|gif|webp)$/i.test(name)){
    const dataUrl=await fileToImageDataUrl(file);
    return dataUrl?await sendToClaude(dataUrl,true):null;
  }
  if(/\.pdf$/i.test(name)){
    const pdfText=await pdfToText(file);
    if(pdfText&&pdfText.trim().length>100) return await sendToClaude(pdfText,false);
    const dataUrl=await pdfToImageDataUrl(file);
    if(dataUrl) return await sendToClaude(dataUrl,true);
    return {type:'other',income:null,expense:null,balance:null,summary:'לא הצלחנו לקרוא את ה-PDF'};
  }
  if(/\.(docx?)$/i.test(name)){
    const text=await wordToText(file);
    return text?await sendToClaude(text,false):null;
  }
  if(/\.(xlsx?|csv)$/i.test(name)){
    const text=await excelToText(file);
    return text?await sendToClaude(text,false):null;
  }
  return null;
}

function recalcKPI(){
  const f=currentFamily;
  f.kpi.income=0; f.kpi.expense=0; f.kpi.cashflow=0; f.kpi.balance=0; f.score=0;
  f.assets=f.assets.filter(a=>!a.fromDoc);

  // Deduplicate docs by name — keep only first occurrence per filename
  const seenNames=new Set();
  const uniqueDocs=(f.docs||[]).filter(d=>{
    if(seenNames.has(d.name)) return false;
    seenNames.add(d.name);
    return true;
  });
  if(uniqueDocs.length<(f.docs||[]).length) f.docs=uniqueDocs;

  // ══ כלל 1: כפילויות — תמיד MAX בתוך קבוצה, לא סכום ══
  // ══ כלל 2: שוטף בלבד — חד-פעמי הופרד ל-aiOneTime ══
  // ══ כלל 3: השוואה נכונה בין מקורות ══
  // ══ כלל 4: דיור = אשראי + משכנתא (לא להציג חלקית) ══

  // ── הכנסה ──
  // תלושי שכר: כל תלוש = עובד אחר, נסכום
  const salaryDocs=uniqueDocs.filter(d=>d.aiType==='salary'&&d.aiIncome>0);
  const salaryIncome=salaryDocs.reduce((s,d)=>s+d.aiIncome,0);

  // בנק: כמה מסמכים לאותו חשבון → MAX בלבד
  // אם יש תלוש שכר — הבנק לא נספר (הכנסה כבר שם)
  const hasSalaryDoc=salaryIncome>0;
  const bankIncomeDocs=uniqueDocs.filter(d=>d.aiType==='bank'&&d.aiIncome>0);
  const bankIncome=hasSalaryDoc?0:(bankIncomeDocs.length>0?Math.max(...bankIncomeDocs.map(d=>d.aiIncome)):0);
  const bankExtraIncome=bankIncome;

  // שאר הכנסות (חיסכון ופנסיה שמשלמים)
  const otherIncome=uniqueDocs.filter(d=>!['salary','bank'].includes(d.aiType)&&d.aiIncome>0)
    .reduce((s,d)=>s+d.aiIncome,0);

  const income=salaryIncome+bankIncome+otherIncome;

  // ── הוצאה ──
  // אשראי: אותה כרטיס, מספר חודשים → ממוצע חודשים מלאים (לא סכום)
  // "חלקי" = נמוך מ-40% מהחציון
  const creditDocs=uniqueDocs.filter(d=>d.aiType==='credit'&&d.aiExpense>0);
  let fullCreditDocs=creditDocs;
  if(creditDocs.length>1){
    const vals=creditDocs.map(d=>d.aiExpense).sort((a,b)=>a-b);
    const median=vals[Math.floor(vals.length/2)];
    const f2=creditDocs.filter(d=>d.aiExpense>=median*0.4);
    if(f2.length>0) fullCreditDocs=f2;
  }
  // אם הבנק מדווח תשלומי אשראי → השתמש בזה (MAX בין בנקים, כי אותו חשבון)
  const bankCreditVals=uniqueDocs.filter(d=>d.aiType==='bank'&&d.aiCreditPayments>0).map(d=>d.aiCreditPayments);
  let creditExpense=0;
  if(bankCreditVals.length>0){
    creditExpense=Math.max(...bankCreditVals); // MAX כי אותו חשבון
  } else if(fullCreditDocs.length>0){
    creditExpense=fullCreditDocs.reduce((s,d)=>s+d.aiExpense,0)/fullCreditDocs.length;
  }

  // משכנתא: כמה מסמכים לאותה משכנתא → MAX (לא סכום)
  const mortgageDocs=uniqueDocs.filter(d=>d.aiType==='mortgage'&&d.aiExpense>0);
  const mortgageExpense=mortgageDocs.length>0?Math.max(...mortgageDocs.map(d=>d.aiExpense)):0;

  // הלוואות: דדופליקציה ±10% (שוב, אותה הלוואה עשויה להופיע פעמיים)
  const loanDocs=uniqueDocs.filter(d=>d.aiType==='loan'&&d.aiExpense>0);
  const seenLoans=[];
  let loanExpense=0;
  loanDocs.forEach(d=>{
    const isDup=seenLoans.some(v=>Math.abs(v-d.aiExpense)/Math.max(v,d.aiExpense)<0.10);
    if(!isDup){seenLoans.push(d.aiExpense);loanExpense+=d.aiExpense;}
  });

  // שאר
  const otherExpense=uniqueDocs.filter(d=>!['credit','mortgage','loan','bank'].includes(d.aiType)&&d.aiExpense>0)
    .reduce((s,d)=>s+d.aiExpense,0);

  const expense=creditExpense+mortgageExpense+loanExpense+otherExpense;

  // ── ASSETS from docs ──
  uniqueDocs.forEach(d=>{
    const type=d.aiType||'';
    if(d.aiBalance&&(type==='mortgage'||type==='loan')){
      f.assets.push({name:type==='mortgage'?'משכנתא':'הלוואה',icon:type==='mortgage'?'🏠':'📋',
        bg:'#fef2f2',value:-d.aiBalance,detail:d.aiSummary||'',type,fromDoc:true});
    }
    if(d.aiBalance&&type==='saving'){
      f.assets.push({name:'חיסכון / קרן',icon:'📈',bg:'#f0fdf4',value:d.aiBalance,detail:d.aiSummary||'',type:'saving',fromDoc:true});
    }
    if(d.aiBalance&&type==='bank'){
      f.assets=f.assets.filter(a=>a.type!=='bank');
      f.assets.push({name:'יתרת חשבון עו"ש',icon:'🏦',bg:'#eff6ff',value:d.aiBalance,detail:d.aiSummary||'',type:'bank',fromDoc:true});
    }
  });

  // ── KPI ──
  if(income>0) f.kpi.income=income;
  if(expense>0) f.kpi.expense=expense;
  if(income>0&&expense>0){
    f.kpi.cashflow=income-expense;
    f.kpi.balance=Math.round(f.kpi.cashflow*12); // annual free cash (12 months)
  }

  // ── SCORE: cashflow ratio + debt penalty ──
  if(income>0){
    const cashflowRatio=(income-expense)/income;           // savings rate
    const totalDebt=f.assets.filter(a=>a.value<0).reduce((s,a)=>s+Math.abs(a.value),0);
    const debtPenalty=totalDebt>0?Math.min(20,Math.round(totalDebt/income/6)):0; // up to -20 pts
    const base=Math.round(50+cashflowRatio*120);
    f.score=Math.min(100,Math.max(10,base-debtPenalty));
  }

  // ── CATEGORIES from credit card docs — monthly average ──
  const catColors={'מזון':'#0d9488','קניות':'#f59e0b','תחבורה':'#8b5cf6','בילויים':'#06b6d4','דיור':'#1a3a5c','בריאות':'#ec4899','חינוך':'#2563a8','אחר':'#94a3b8'};
  const merged={};
  // השתמש בחודשים המלאים בלבד (אותו סינון כמו חישוב ההוצאה)
  const creditCatDocs=fullCreditDocs.filter(d=>d.aiCategories);
  creditCatDocs.forEach(d=>{
    Object.entries(d.aiCategories).forEach(([k,v])=>{if(v>0)merged[k]=(merged[k]||0)+v;});
  });
  const catMonths=creditCatDocs.length||1;
  // כלל 4: הוסף משכנתא+הלוואות לקטגוריית דיור (אחרת הדיור נראה זניח)
  if(mortgageExpense>0) merged['משכנתא']=(merged['משכנתא']||0)+mortgageExpense*catMonths;
  if(loanExpense>0) merged['הלוואות']=(merged['הלוואות']||0)+loanExpense*catMonths;
  if(Object.keys(merged).length>0){
    f.categories=Object.entries(merged).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
      .map(([k,v])=>({label:k,value:Math.round(v/catMonths),color:catColors[k]||'#94a3b8'}));
    // Only auto-generate budget if user hasn't customised it yet
    const userEdited=f.budget&&f.budget.length>0&&f.budget.some(b=>b.budgetGoal!==Math.round(b.actual*1.1));
    if(!userEdited){
      f.budget=f.categories.map(c=>({cat:c.label,budgetGoal:Math.round(c.value*1.1),actual:c.value}));
    } else {
      // Update actuals only — preserve user-set goals
      f.budget.forEach(b=>{
        const cat=f.categories.find(c=>c.label===b.cat);
        if(cat) b.actual=cat.value;
      });
    }
  }

  // ── DATA QUALITY WARNINGS ──
  f.kpi._warnings=[];
  if(salaryIncome>0&&bankExtraIncome>0)
    f.kpi._warnings.push('⚠️ זוהו הכנסות גם בתלוש וגם בתדפיס בנק — ייתכן שיש כפל. בדוק שהבנק לא מראה שוב את אותה משכורת.');
  const warnCreditExpense=uniqueDocs.filter(d=>d.aiType==='credit').reduce((s,d)=>s+(d.aiExpense||0),0);
  const mortgageLoanExpense=uniqueDocs.filter(d=>d.aiType==='mortgage'||d.aiType==='loan').reduce((s,d)=>s+(d.aiExpense||0),0);
  if(warnCreditExpense>0&&mortgageLoanExpense>0&&warnCreditExpense>expense*0.7)
    f.kpi._warnings.push('💡 וודא שהמשכנתא/הלוואה אינה כלולה גם בכרטיס האשראי — עלול לגרום לספירה כפולה.');
  if(income>0&&Math.round(income/1000)*1000===income&&income>10000)
    f.kpi._warnings.push('📌 ההכנסה היא מספר עגול ('+income.toLocaleString('he-IL')+' ₪) — ייתכן שהAI עיגל. בדוק מול המסמך המקורי.');
}

function applySingleDoc(ai, docEntry){
  const f=currentFamily;
  const type=ai.type||'other';
  if(docEntry){
    docEntry.aiIncome=ai.income||null;
    docEntry.aiExpense=ai.expense||null;
    docEntry.aiBalance=ai.balance||null;
    docEntry.aiOneTime=ai.oneTime||null;
    docEntry.aiCategories=ai.categories||null;
    docEntry.aiCreditPayments=ai.creditPayments||null;
    docEntry.aiType=type;
    docEntry.aiSummary=ai.summary||'';
  }
  // Rebuild KPI from all docs (prevents double-counting on re-uploads)
  recalcKPI();
  const income=f.kpi.income||0;
  const expense=f.kpi.expense||0;
  // Categories/budget are set manually by the user, not auto-generated from docs
  if((!f.months||!f.months.length)&&income>0){
    f.months=['יול','אוג','ספט','אוק','נוב','דצמ','ינו','פבר','מרץ','אפר','מאי','יונ'];
    f.incomes=f.months.map(()=>Math.round(income*(0.95+Math.random()*.1)));
    f.expenses=f.months.map(()=>Math.round(expense*(0.93+Math.random()*.1)));
  }
}

async function processFiles(files){
  const f=currentFamily;
  if(!f.docs)f.docs=[];
  pendingDocs=[];
  const fileEntries=[];
  for(const file of files){
    const det=detectDocType(file.name);
    let dataUrl=null;
    try{if(file.size<5*1024*1024)dataUrl=await fileToBase64(file);}catch(e){}
    // Replace existing doc with same name instead of duplicating
    const existingIdx=f.docs.findIndex(d=>d.name===file.name);
    let docEntry;
    if(existingIdx>=0){
      docEntry=f.docs[existingIdx];
      Object.assign(docEntry,{type:det.type,icon:det.icon,date:new Date().toLocaleDateString('he-IL'),status:'proc',dataUrl,aiIncome:null,aiExpense:null,aiBalance:null,aiType:null,aiSummary:null});
    } else {
      docEntry={name:file.name,type:det.type,icon:det.icon,date:new Date().toLocaleDateString('he-IL'),status:'proc',dataUrl};
      f.docs.unshift(docEntry);
    }
    fileEntries.push({file,name:file.name,det,docEntry});
  }
  saveDB(DB);
  buildDocs();
  const total=fileEntries.length;
  if(total>1) showToast(`🤖 מנתח ${total} מסמכים עם Claude AI...`);
  else showToast('🤖 מנתח מסמך עם Claude AI...');

  for(let idx=0;idx<fileEntries.length;idx++){
    const pd=fileEntries[idx];
    if(total>1) showToast(`🤖 מנתח ${idx+1}/${total}: ${pd.name}`);
    const ai=await analyzeWithAI(pd.file);
    if(ai && ai.type && ai.type!=='other'){
      applySingleDoc(ai, pd.docEntry);
      pd.docEntry.status='done';
      const label=ai.income?'הכנסה ₪'+ai.income.toLocaleString():ai.expense?'הוצאה ₪'+ai.expense.toLocaleString():ai.balance?'יתרה ₪'+ai.balance.toLocaleString():'';
      showToast('✅ זוהה: '+(ai.summary||pd.name)+(label?' — '+label:''));
    } else {
      pd.docEntry.status='done';
      pendingDocs.push({file:pd.file,name:pd.name,det:pd.det});
    }
    saveDB(DB);
    buildDocs();
    buildHome(); // עדכון מיידי של הדשבורד אחרי כל מסמך
  }

  if(total>1) showToast(`✅ כל ${total} המסמכים עובדו בהצלחה!`);
  setTimeout(()=>showPage('home'),800);
}

function autoApplyAIResults(results){
  const f=currentFamily;
  let totalIncome=f.kpi.income||0;
  let totalExpense=f.kpi.expense||0;
  let changed=false;

  results.forEach(r=>{
    const ai=r.ai;
    if(!ai) return;
    changed=true;
    const type=ai.type||r.det.type;
    if(ai.income&&ai.income>0) totalIncome+=ai.income;
    if(ai.expense&&ai.expense>0){
      if(type==='mortgage'||type==='loan'){
        f.assets=f.assets.filter(a=>a.type!==type);
        f.assets.push({name:type==='mortgage'?'משכנתא':'הלוואה',icon:type==='mortgage'?'🏠':'📋',
          bg:'#fef2f2',value:-(ai.balance||ai.expense),detail:ai.summary||'',type});
      }
      totalExpense+=ai.expense;
    }
    if(ai.balance&&ai.balance>0&&(type==='saving')){
      f.assets.push({name:'חיסכון / קרן',icon:'📈',bg:'#f0fdf4',value:ai.balance,detail:ai.summary||'',type:'saving'});
    }
  });

  if(totalIncome>0) f.kpi.income=totalIncome;
  if(totalExpense>0) f.kpi.expense=totalExpense;
  if(totalIncome>0&&totalExpense>0){
    f.kpi.cashflow=totalIncome-totalExpense;
    f.kpi.balance=Math.round(f.kpi.cashflow*12);
  }
  if(f.budget.length===0&&totalExpense>0){
    const e=totalExpense;
    f.budget=[
      {cat:'דיור',budgetGoal:Math.round(e*.35),actual:Math.round(e*.35)},
      {cat:'מזון',budgetGoal:Math.round(e*.18),actual:Math.round(e*.18)},
      {cat:'תחבורה',budgetGoal:Math.round(e*.12),actual:Math.round(e*.11)},
      {cat:'חינוך',budgetGoal:Math.round(e*.10),actual:Math.round(e*.10)},
      {cat:'בריאות',budgetGoal:Math.round(e*.06),actual:Math.round(e*.06)},
      {cat:'הלוואות',budgetGoal:Math.round(e*.10),actual:Math.round(e*.10)},
      {cat:'בילויים',budgetGoal:Math.round(e*.06),actual:Math.round(e*.05)},
      {cat:'אחר',budgetGoal:Math.round(e*.03),actual:Math.round(e*.05)},
    ];
    f.categories=f.budget.map((b,i)=>({label:b.cat,value:b.actual,
      color:['#1a3a5c','#0d9488','#f59e0b','#8b5cf6','#ec4899','#ef4444','#06b6d4','#94a3b8'][i]}));
  }
  if((!f.months||!f.months.length)&&totalIncome>0){
    f.months=['יול','אוג','ספט','אוק','נוב','דצמ','ינו','פבר','מרץ','אפר','מאי','יונ'];
    f.incomes=f.months.map(()=>Math.round(totalIncome*(0.95+Math.random()*.1)));
    f.expenses=f.months.map(()=>Math.round(totalExpense*(0.93+Math.random()*.1)));
  }
  if(totalIncome>0){
    const ratio=(totalIncome-totalExpense)/totalIncome;
    f.score=Math.min(100,Math.max(10,Math.round(50+ratio*120)));
  }
  f.docs.forEach(d=>{if(d.status==='proc')d.status='done';});
  pendingDocs=[];
  saveDB(DB);
  if(changed){
    showToast('✅ AI ניתח את המסמכים ועדכן את הדשבורד!');
    setTimeout(()=>showPage('home'),800);
  } else {
    buildDocs();
    showToast('לא נמצאו נתונים פיננסיים — נסה קובץ אחר');
  }
}

let _analysisTypes=[];
function applyAnalysis(types){
  if(!types) types=_analysisTypes;
  const f=currentFamily;
  let totalIncome=f.kpi.income||0;
  let totalExpense=f.kpi.expense||0;

  types.forEach((type,i)=>{
    if(type==='salary'){
      const inc=parseInt(document.getElementById(`an-income-${i}`)?.value)||0;
      if(inc>0) totalIncome+=inc;
    }
    if(type==='bank'){
      const credit=parseInt(document.getElementById(`an-credit-${i}`)?.value)||0;
      const debit =parseInt(document.getElementById(`an-debit-${i}`)?.value)||0;
      if(credit>0) totalIncome=Math.max(totalIncome,credit);
      if(debit>0)  totalExpense+=debit;
    }
    if(type==='credit'){
      const charge=parseInt(document.getElementById(`an-credit-${i}`)?.value)||0;
      if(charge>0) totalExpense+=charge;
    }
    if(type==='mortgage'){
      const bal=parseInt(document.getElementById(`an-balance-${i}`)?.value)||0;
      const pay=parseInt(document.getElementById(`an-payment-${i}`)?.value)||0;
      if(bal>0){
        const existing=f.assets.find(a=>a.type==='mortgage');
        if(existing){existing.value=-bal;existing.detail=`החזר ${pay?pay.toLocaleString('he-IL'):'-'} ₪/חודש`;}
        else f.assets.push({name:'משכנתא',icon:'🏠',bg:'#fef2f2',value:-bal,detail:`החזר ${pay?pay.toLocaleString('he-IL'):'-'} ₪/חודש`,type:'mortgage'});
        if(pay>0) totalExpense+=pay;
      }
    }
    if(type==='loan'){
      const bal=parseInt(document.getElementById(`an-balance-${i}`)?.value)||0;
      const pay=parseInt(document.getElementById(`an-payment-${i}`)?.value)||0;
      if(bal>0){
        f.assets.push({name:'הלוואה',icon:'📋',bg:'#fffbeb',value:-bal,detail:`החזר ${pay?pay.toLocaleString('he-IL'):'-'} ₪/חודש`,type:'loan'});
        if(pay>0) totalExpense+=pay;
      }
    }
    if(type==='saving'){
      const val=parseInt(document.getElementById(`an-value-${i}`)?.value)||0;
      if(val>0) f.assets.push({name:'חיסכון / קרן',icon:'📈',bg:'#f0fdf4',value:val,detail:'נתון מקובץ שהועלה',type:'saving'});
    }
    if(type==='other'){
      const subtype=document.getElementById(`an-subtype-${i}`)?.value;
      const amt=parseInt(document.getElementById(`an-manual-${i}`)?.value)||0;
      if(amt>0){
        if(subtype==='salary') totalIncome+=amt;
        else if(subtype==='bank'||subtype==='credit') totalExpense+=amt;
        else if(subtype==='mortgage'||subtype==='loan') f.assets.push({name:subtype==='mortgage'?'משכנתא':'הלוואה',icon:'📋',bg:'#fffbeb',value:-amt,detail:'מסמך שהועלה',type:subtype});
        else if(subtype==='saving') f.assets.push({name:'חיסכון',icon:'📈',bg:'#f0fdf4',value:amt,detail:'מסמך שהועלה',type:'saving'});
        else totalIncome+=amt;
      }
    }
  });

  // Update KPIs
  if(totalIncome>0) f.kpi.income=totalIncome;
  if(totalExpense>0) f.kpi.expense=totalExpense;
  if(totalIncome>0&&totalExpense>0){
    f.kpi.cashflow=totalIncome-totalExpense;
    f.kpi.balance=Math.round(f.kpi.cashflow*12);
  }

  // Build default budget if empty
  if(f.budget.length===0&&totalExpense>0){
    const e=totalExpense;
    f.budget=[
      {cat:'דיור',budgetGoal:Math.round(e*0.35),actual:Math.round(e*0.35)},
      {cat:'מזון',budgetGoal:Math.round(e*0.18),actual:Math.round(e*0.18)},
      {cat:'תחבורה',budgetGoal:Math.round(e*0.12),actual:Math.round(e*0.11)},
      {cat:'חינוך',budgetGoal:Math.round(e*0.10),actual:Math.round(e*0.10)},
      {cat:'בריאות',budgetGoal:Math.round(e*0.06),actual:Math.round(e*0.06)},
      {cat:'הלוואות',budgetGoal:Math.round(e*0.10),actual:Math.round(e*0.10)},
      {cat:'בילויים',budgetGoal:Math.round(e*0.06),actual:Math.round(e*0.05)},
      {cat:'אחר',budgetGoal:Math.round(e*0.03),actual:Math.round(e*0.05)},
    ];
    f.categories=f.budget.map((b,i)=>({
      label:b.cat, value:b.actual,
      color:['#1a3a5c','#0d9488','#f59e0b','#8b5cf6','#ec4899','#ef4444','#06b6d4','#94a3b8'][i]
    }));
  }

  // Build default trend if empty
  if((!f.months||!f.months.length)&&totalIncome>0){
    f.months=['יול','אוג','ספט','אוק','נוב','דצמ','ינו','פבר','מרץ','אפר','מאי','יונ'];
    f.incomes=f.months.map((_,i)=>Math.round(totalIncome*(0.95+Math.random()*0.1)));
    f.expenses=f.months.map((_,i)=>Math.round(totalExpense*(0.93+Math.random()*0.1)));
  }

  // Compute score
  if(totalIncome>0){
    const cashflowRatio=(totalIncome-totalExpense)/totalIncome;
    f.score=Math.min(100,Math.max(10,Math.round(50+cashflowRatio*120)));
  }

  // Mark docs as done
  f.docs.forEach(d=>{if(d.status==='proc')d.status='done';});

  saveDB(DB);
  closeModal();
  buildDocs();
  showToast('✅ הדשבורד עודכן בהצלחה!');
  setTimeout(()=>{showPage('home');},600);
}

function skipAnalysis(){

  saveDB(DB);

}

const BUDGET_RATIOS={דיור:0.30,מזון:0.15,תחבורה:0.10,בריאות:0.05,חינוך:0.08,קניות:0.10,בילויים:0.07,אחר:0.15};
const CAT_COLORS={מזון:'#0d9488',קניות:'#f59e0b',תחבורה:'#8b5cf6',בילויים:'#06b6d4',דיור:'#1a3a5c',בריאות:'#ec4899',חינוך:'#2563a8',אחר:'#94a3b8'};

function suggestBudget(){
  const f=currentFamily;
  const income=f.kpi&&f.kpi.income>0?f.kpi.income:0;
  if(!income){showToast('נא להעלות תלוש שכר או תדפיס בנק קודם');return;}
  const actuals={};
  (f.categories||[]).forEach(c=>{actuals[c.label]=c.value;});
  const cats=Object.keys(BUDGET_RATIOS);
  Object.keys(actuals).forEach(k=>{if(!cats.includes(k))cats.push(k);});
  f.budget=cats.map(cat=>({cat,budgetGoal:Math.round((BUDGET_RATIOS[cat]||0.05)*income),actual:actuals[cat]||0}));
  saveDB(DB);buildBudget();
  showToast('תקציב מוצע לפי '+income.toLocaleString('he-IL')+' הכנסה חודשית');
}

function saveBudgetRow(i){
  const f=currentFamily;

  f.budget[i].budgetGoal=val;
  saveDB(DB);buildBudget();showToast('יעד '+f.budget[i].cat+' עודכן');
}
function addBudgetCat(){
  const f=currentFamily;
  const name=(document.getElementById('new-cat-name')?.value||'').trim();
  const goal=parseInt(document.getElementById('new-cat-goal')?.value)||0;
  if(!name||!goal){showToast('נא למלא שם וסכום');return;}

  f.budget.push({cat:name,budgetGoal:goal,actual:0});
  saveDB(DB);buildBudget();showToast('קטגוריה נוספה');
}
function updateBudgetGoal(){

function toggleTask(i){currentFamily.tasks[i].done=!currentFamily.tasks[i].done;saveDB(DB);buildGoals();}
function addTaskPrompt(){
  const txt=prompt('טקסט המשימה:');
  if(txt){currentFamily.tasks.push({text:txt,done:false,prio:'m'});saveDB(DB);buildGoals();}
}

// ── ASSETS ────────────────────────────────────────────────────────────────────
function buildAssets(){
  const f=currentFamily, fmt=n=>n.toLocaleString('he-IL');
  const assets=f.assets||[];

  // Detect missing data situations
  const hasMortgage=assets.some(a=>a.type==='mortgage');
  const hasProperty=assets.some(a=>a.type==='property'||a.type==='realestate');
  const hasLoan=assets.some(a=>a.type==='loan');
  const missingProperty=hasMortgage&&!hasProperty;

  const positiveAssets=assets.filter(a=>a.value>0);
  const negativeAssets=assets.filter(a=>a.value<0);
  const totalPos=positiveAssets.reduce((s,a)=>s+a.value,0);
  const totalNeg=negativeAssets.reduce((s,a)=>s+a.value,0);
  const net=totalPos+totalNeg;
  const netIsValid=!missingProperty; // can't compute net worth if property is missing

  const missingAlerts=[];
  if(missingProperty) missingAlerts.push({
    icon:'🏠',
    title:'חסר שווי נכס נדל"ן',
    text:'קיימת משכנתא במערכת, אך לא הוזן שווי הנכס. לא ניתן לחשב שווי נטו ללא נתון זה.'
  });

  document.getElementById('page-assets').innerHTML=`
    <div class="section-title">נכסים והתחייבויות</div>

    ${missingAlerts.map(a=>`
    <div style="background:#fef3c7;border:1.5px solid #f59e0b;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start">
      <span style="font-size:22px">${a.icon}</span>
      <div style="flex:1">
        <div style="font-weight:700;color:#92400e;margin-bottom:4px">${a.title}</div>
        <div style="font-size:13px;color:#78350f;margin-bottom:10px">${a.text}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input id="property-val-input" type="number" placeholder="שווי שוק של הנכס (₪)" style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #d97706;border-radius:8px;font-size:14px;font-family:inherit;direction:rtl">
          <button onclick="savePropertyValue()" style="background:#d97706;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">💾 שמור שווי נכס</button>
        </div>
      </div>
    </div>`).join('')}

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon">📈</div><div class="kpi-label">סה"כ נכסים</div><div class="kpi-value">${netIsValid?fmt(totalPos)+' ₪':'חסר נתון'}</div></div>
      <div class="kpi-card neg"><div class="kpi-icon">📉</div><div class="kpi-label">סה"כ חובות</div><div class="kpi-value">${fmt(Math.abs(totalNeg))} ₪</div></div>
    </div>
    <div class="card" style="text-align:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--gray5);font-weight:600;margin-bottom:4px">שווי נטו</div>
      ${netIsValid
        ? `<div style="font-size:28px;font-weight:800;color:${net>=0?'var(--teal)':'#ef4444'}">${fmt(net)} ₪</div>`
        : `<div style="font-size:20px;font-weight:800;color:#f59e0b">⚠️ חסר מידע לחישוב</div>
           <div style="font-size:12px;color:var(--gray5);margin-top:4px">יש להזין שווי נכס הנדל"ן למעלה</div>`
      }
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-title" style="margin-bottom:0">פירוט נכסים</div>
      <button onclick="showAddAssetForm()" style="background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ הוסף נכס ידנית</button>
    </div>

    <div id="add-asset-form" class="card" style="display:none;margin-bottom:12px;border:1.5px dashed var(--teal)">
      <div style="font-weight:700;margin-bottom:10px;color:var(--text)">הוספת נכס ידנית</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="field-label">שם הנכס</label><input id="ma-name" class="field-input" placeholder="דירה / חיסכון / רכב..." style="padding:9px 12px"></div>
        <div><label class="field-label">סוג</label>
          <select id="ma-type" class="field-input" style="padding:9px 12px">
            <option value="property">נדל"ן / דירה</option>
            <option value="saving">חיסכון / קרן</option>
            <option value="pension">פנסיה</option>
            <option value="vehicle">רכב</option>
            <option value="other">אחר</option>
          </select>
        </div>
      </div>
      <div><label class="field-label">שווי שוק (₪)</label><input id="ma-value" class="field-input" type="number" placeholder="1500000" style="padding:9px 12px;width:50%"></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button onclick="saveManualAsset()" style="background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">💾 שמור</button>
        <button onclick="document.getElementById('add-asset-form').style.display='none'" style="background:var(--gray3);border:none;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:inherit">ביטול</button>
      </div>
    </div>

    ${positiveAssets.length===0?`<div style="color:var(--gray4);text-align:center;padding:20px;font-size:14px">אין נכסים מוגדרים עדיין</div>`:''}
    ${positiveAssets.map(a=>`<div class="asset-item">
      <div class="asset-icon" style="background:${a.bg||'#f0fdf4'}">${a.icon||'📦'}</div>
      <div class="asset-meta"><div class="asset-name">${a.name}</div><div class="asset-detail">${a.detail||''}</div></div>
      <div class="asset-value">${fmt(a.value)} ₪<small>${a.type==='saving'?'חיסכון':a.type==='pension'?'פנסיה':a.type==='property'||a.type==='realestate'?'נדל"ן':'נכס'}</small></div>
    </div>`).join('')}
    <div class="section-title" style="margin-top:16px">התחייבויות</div>
    ${negativeAssets.length===0?`<div style="color:var(--gray4);text-align:center;padding:20px;font-size:14px">אין התחייבויות</div>`:''}
    ${negativeAssets.map(a=>`<div class="asset-item">
      <div class="asset-icon" style="background:${a.bg||'#fef2f2'}">${a.icon||'📋'}</div>
      <div class="asset-meta"><div class="asset-name">${a.name}</div><div class="asset-detail">${a.detail||''}</div></div>
      <div class="asset-value neg">${fmt(a.value)} ₪<small>חוב</small></div>
    </div>`).join('')}`;
}

function showAddAssetForm(){
  const el=document.getElementById('add-asset-form');
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function savePropertyValue(){
  const val=parseInt(document.getElementById('property-val-input')?.value)||0;
  if(val<=0){showToast('נא להזין שווי חיובי');return;}
  const f=currentFamily;
  // Remove any existing manual property entry, then add new one
  f.assets=f.assets.filter(a=>a.type!=='property'&&a.type!=='realestate');
  f.assets.push({name:'נכס נדל"ן',icon:'🏠',bg:'#f0fdf4',value:val,detail:'הוזן ידנית',type:'property'});
  saveDB(DB);
  recalcKPI();
  buildAssets();
  showToast('✅ שווי הנכס נשמר!');
}

function saveManualAsset(){
  const name=(document.getElementById('ma-name')?.value||'').trim();
  const type=document.getElementById('ma-type')?.value||'other';
  const val=parseInt(document.getElementById('ma-value')?.value)||0;
  if(!name||val<=0){showToast('נא למלא שם וסכום');return;}
  const icons={property:'🏠',saving:'📈',pension:'💼',vehicle:'🚗',other:'📦'};
  const bgs={property:'#f0fdf4',saving:'#f0fdf4',pension:'#eff6ff',vehicle:'#faf5ff',other:'#f8fafc'};
  const f=currentFamily;
  f.assets.push({name,icon:icons[type]||'📦',bg:bgs[type]||'#f8fafc',value:val,detail:'הוזן ידנית',type});
  saveDB(DB);
  buildAssets();
  showToast('✅ נכס נוסף בהצלחה!');
}

      // find large categories (>20% of total)
      const largeCats=cats.filter(c=>(c.value/totalCat)>0.20);
      // for each large cat, find which docs contributed
      const creditDocs=(f.docs||[]).filter(d=>d.aiType==='credit'&&d.aiCategories);
      const catHtml=cats.map(c=>{
        const pct=Math.round((c.value/totalCat)*100);
        const isLarge=pct>20;
        // find contributing docs for this category
        const contributors=creditDocs.map(d=>({name:d.name,amt:(d.aiCategories||{})[c.label]||0})).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
        return `<div style="margin-bottom:${isLarge?16:10}px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

          </div>`:''}
          ${isLarge&&c.label==='אחר'?`<div style="margin-top:6px;font-size:11px;color:#92400e;background:#fffbeb;border-radius:6px;padding:6px 10px;border:1px solid #fde68a">

          </div>`:''}
        </div>`;
      }).join('');
      return `<div class="card" style="margin-bottom:16px">
        <div class="section-title">הוצאות לפי קטגוריה${largeCats.length?` <span style="font-size:11px;color:#92400e;background:#fef3c7;border-radius:5px;padding:2px 7px;font-weight:600">🔍 ${largeCats.length} קטגוריות גדולות</span>`:''}

        <div style="font-size:12px;color:var(--gray5);margin:8px 0 16px">סה"כ הוצאות שסווגו: ₪ ${Number(totalCat).toLocaleString('he-IL')} · קטגוריה מעל 20% מוצגת עם פירוט</div>
        ${catHtml}
      </div>`;
    })()}

    <!-- Goals -->
    ${f.goals&&f.goals.length?`
    <div class="card" style="margin-bottom:16px">
      <div class="section-title">יעדים פיננסיים</div>
      <div style="overflow-x:auto;margin-top:12px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">

          <tbody>
            ${f.goals.map(g=>{const pct=Math.round(((g.current||0)/g.target)*100);return`<tr style="border-bottom:1px solid var(--gray3)">

            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`:''}
  </div>`;
}

      ${TD(pct+'%',pct>=100?'#0d9488':pct>=50?'#f59e0b':'#ef4444',true,i%2?'#f8fafc':'#fff')}
      ${TD(g.date||'—','#64748b',false,i%2?'#f8fafc':'#fff')}
      ${TD('','','','')}${TD('','','','')}${TD('','','','')}
    </tr>`;}).join('')}
    ${GAP}`:''}

    <!-- ASSETS -->
    ${f.assets&&f.assets.length?`${HDR('🏦 נכסים והתחייבויות','#e0f2fe',8)}
    <tr>${TH('פריט')}${TH('שווי')}${TH('פרטים')}${TH('')}${TH('')}${TH('')}${TH('')}${TH('')}</tr>
    ${f.assets.map((a,i)=>`<tr>
      ${TD((a.icon||'')+' '+a.name,'#1e293b',false,i%2?'#f8fafc':'#fff')}
      ${TD(fmt(a.value)+' ₪',a.value>=0?'#0d9488':'#ef4444',true,a.value>=0?(i%2?'#f0fdf4':'#f9fff9'):(i%2?'#fef2f2':'#fff9f9'))}
      ${TD(a.detail||'','#64748b',false,i%2?'#f8fafc':'#fff')}
      ${TD('','','','')}${TD('','','','')}${TD('','','','')}${TD('','','','')}${TD('','','','')}
    </tr>`).join('')}
    <tr>
      ${TD('מאזן נטו','#1a3a5c',true,'#f1f5f9')}
      ${TD(fmt(totalAssets-totalDebts)+' ₪',totalAssets-totalDebts>=0?'#0d9488':'#ef4444',true,'#f1f5f9')}
      ${TD('נכסים '+fmt(totalAssets)+' | חובות '+fmt(totalDebts),'#64748b',false,'#f1f5f9')}
      ${TD('','','','')}${TD('','','','')}${TD('','','','')}${TD('','','','')}${TD('','','','')}
    </tr>
    ${GAP}`:''}

    <!-- FOOTER -->
    <tr><td colspan="8" style="padding:6px 11px;border:1px solid #e5e7eb;color:#94a3b8;font-size:10px">שקט כלכלי · כלי לחשיבה בלבד, אינו מהווה ייעוץ פיננסי · הופק: ${dateStr}</td></tr>

  </table>
  </body></html>`;

  const blob=new Blob(['﻿'+xls],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`דוח פיננסי — משפחת ${f.name} — ${new Date().toLocaleDateString('he-IL').replace(/\//g,'-')}.xls`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ קובץ Excel הורד בהצלחה');
}

// ── HELP ──────────────────────────────────────────────────────────────────────
function buildHelp(){
  const steps=[
    {n:'1',title:'איך מעלים מסמכים?',text:'לחצו על "מסמכים" בתפריט ↓ ולחצו על "גרור קובץ". תוכלו להעלות PDF, Excel, CSV או תמונה מהטלפון. המערכת מזהה ומנתחת אוטומטית.'},
    {n:'2',title:'מה זה ציון שקט כלכלי?',text:'מספר בין 0-100 שמסכם את המצב הפיננסי שלכם. מחושב לפי: תזרים, חסכונות, רמת חובות ויציבות הכנסות. יעד: מעל 75.'},
    {n:'3',title:'איך משתמשים בעוזר ה-AI?',text:'לחצו על "AI" בתפריט ↓ ושאלו כל שאלה. תוכלו גם לתת פקודות: "תגדיר יעד של 30,000 ₪", "קבע תקציב מזון 3,000 ₪".'},
    {n:'4',title:'מה זה תובנות?',text:'בלשונית "תובנות" תמצאו ניתוחים אוטומטיים מה-AI שמזהה מגמות, חריגות, וזדמנויות חיסכון בנתונים שלכם.'},
    {n:'5',title:'איך מגדירים יעדים?',text:'לחצו "יעדים" ↓ ואחר כך "+ יעד חדש". הזינו שם, סכום ותאריך יעד. ניתן גם להוסיף דרך ה-AI: "תגדיר יעד חיסכון לרכב של 50,000 ₪".'},
    {n:'6',title:'מה ההבדל בין יעד לביצוע?',text:'במסך "תקציב" תראו את היעד שהגדרתם לעומת מה שהוצאתם בפועל. אפשר לעדכן יעדים ישירות מהטבלה.'},
  ];
  document.getElementById('page-help').innerHTML=`
