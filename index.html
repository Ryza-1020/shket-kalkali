    <div class="card">
      ${steps.map(s=>`<div class="help-step">
        <div class="help-num">${s.n}</div>
        <div class="help-content"><h4>${s.title}</h4><p>${s.text}</p></div>
      </div>`).join('')}
    </div>
    <div class="card" style="background:var(--teal-bg);border:1px solid #99f6e4">
      <div style="font-size:15px;font-weight:700;color:var(--teal);margin-bottom:8px">📞 צריכים עזרה?</div>
      <div style="font-size:14px;color:var(--text2)">פנו ישירות ליועץ דרור דרך מסך "הודעות" – הוא זמין לשאלות בכל שלב.</div>
      <button onclick="showPage('advisor-msg')" style="margin-top:10px;padding:10px 16px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">💬 שלח הודעה ליועץ</button>
    </div>
    <div class="card" style="background:#f8fafc;border:1px solid var(--gray3);margin-top:4px">
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px">⚠️ הצהרת שימוש</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        <p style="margin-bottom:8px">כלי זה <strong>אינו מסחרי בשום אופן</strong> ומיועד לשימוש אישי בלבד עבור לקוחות וחברים של היועץ.</p>
        <p style="margin-bottom:8px">המידע המוצג בפלטפורמה זו <strong>אינו מהווה ייעוץ פיננסי, מקצועי, משפטי או אחר</strong> מכל סוג שהוא.</p>
        <p style="margin-bottom:8px">הכלי נועד אך ורק כ<strong>עזר לחשיבה</strong> — לארגון מידע אישי, הצגת תמונה כוללת וסיוע בהגדרת שאלות, בדומה לאופן שבו היועץ עצמו משתמש בו.</p>
        <p style="color:var(--gray5);font-size:12px">כל החלטה פיננסית טעונה שיקול דעת עצמאי ו/או התייעצות עם בעל מקצוע מוסמך.</p>
      </div>
    </div>`;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function adminPage(page){
  document.querySelectorAll('.admin-tab').forEach((el,i)=>el.classList.toggle('active',['families','reports','messages','settings'][i]===page));
  const main=document.getElementById('admin-main');
  if(page==='families'){
    const fams=DB.families;
    main.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:20px;font-weight:800;color:var(--text)">משפחות (${fams.length})</h2>
        <button class="btn-new" onclick="showAddFamilyModal()">+ משפחה חדשה</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px">
        <div class="admin-stat"><div class="admin-stat-num">${fams.length}</div><div class="admin-stat-label">משפחות</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${Math.round(fams.reduce((s,f)=>s+f.score,0)/Math.max(fams.length,1))}</div><div class="admin-stat-label">ציון ממוצע</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${fams.filter(f=>f.status==='active').length}</div><div class="admin-stat-label">פעילות</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${fams.reduce((s,f)=>s+(f.docs?f.docs.length:0),0)}</div><div class="admin-stat-label">מסמכים</div></div>
      </div>
      <div class="search-bar"><span>🔍</span><input placeholder="חיפוש..." oninput="filterFamiliesAdmin(this.value)" id="fam-search"></div>
      <div id="fam-list">${renderFamilyList(fams)}</div>`;
  } else if(page==='reports'){
    main.innerHTML=`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">דוחות</h2>
      <div class="card"><div class="section-title">ציוני שקט כלכלי לפי משפחה</div><div class="chart-wrap"><canvas id="admin-chart"></canvas></div></div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('admin-chart');
      if(ctx)new Chart(ctx,{type:'bar',data:{labels:DB.families.map(f=>'משפחת '+f.name),datasets:[{label:'ציון',data:DB.families.map(f=>f.score),backgroundColor:DB.families.map(f=>f.score>=75?'#0d9488':f.score>=60?'#f59e0b':'#ef4444'),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});
    },50);
  } else if(page==='messages'){
    main.innerHTML=`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">הודעות</h2>
      ${DB.families.map(f=>`<div class="family-card-admin" onclick="showToast('פותח שיחה עם משפחת ${f.name}')">
        <div class="family-avatar-big">${f.name[0]}</div>
        <div class="family-info"><div class="family-name">משפחת ${f.name}</div><div class="family-sub">לחץ לשליחת הודעה</div></div>
        <span style="font-size:22px">💬</span>
      </div>`).join('')}`;
  } else {
    main.innerHTML=`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">הגדרות</h2>
      <div class="card"><div class="section-title">פרטי יועץ</div>
        <div class="field-group"><label class="field-label">אימייל</label><input class="field-input" value="${ADVISOR_EMAIL}" readonly></div>
        <div class="field-group"><label class="field-label">סיסמה</label><input class="field-input" value="••••" type="password"></div>
      </div>`;
  }
}

function renderFamilyList(fams){
  return fams.map(f=>`<div class="family-card-admin">
    <div class="family-avatar-big">${f.name[0]}</div>
    <div class="family-info">
      <div class="family-name">משפחת ${f.name}</div>
      <div class="family-sub">@${f.username} · ${f.members||'לקוח חדש'}</div>
      <span class="badge ${f.status==='active'?'badge-active':f.status==='inactive'?'badge-inactive':'badge-new'}">${f.status==='active'?'פעיל':f.status==='inactive'?'לא פעיל':'חדש'}</span>
    </div>
    <div style="text-align:center;margin-left:8px">
      <div class="family-score-num">${f.score}</div>
      <div class="family-score-label">ציון</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button onclick="viewAsFamily('${f.id}')" style="padding:6px 12px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit">צפה</button>
      <button onclick="editFamilyModal('${f.id}')" style="padding:6px 12px;background:var(--gray2);color:var(--text);border:1px solid var(--gray3);border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit">ערוך</button>
      <button onclick="resetFamilyData('${f.id}')" style="padding:6px 12px;background:#fef2f2;color:#ef4444;border:1px solid #fca5a5;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit">נקה</button>
      ${f.id!=='fam_cohen'?`<button onclick="deleteFamily('${f.id}')" style="padding:6px 12px;background:#fff;color:#94a3b8;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit">מחק</button>`:''}
    </div>
  </div>`).join('');
}

function resetFamilyData(id){
  const f=DB.families.find(x=>x.id===id);
  if(!f)return;
  if(!confirm(`לנקות את כל הנתונים של משפחת ${f.name}? הפעולה לא ניתנת לביטול.`))return;
  f.score=0; f.kpi={income:0,expense:0,cashflow:0,balance:0};
  f.goals=[]; f.tasks=[]; f.budget=[]; f.assets=[]; f.docs=[];
  f.months=[]; f.incomes=[]; f.expenses=[]; f.categories=[];
  f.messages=[]; f.termsAccepted=false; f.onboardingDone=false;
  saveDB(DB); adminPage('families');
  showToast('נתוני משפחת '+f.name+' נוקו');
}

function deleteFamily(id){
  const f=DB.families.find(x=>x.id===id);
  if(!f)return;
  if(!confirm(`למחוק את משפחת ${f.name}? הפעולה לא ניתנת לביטול.`))return;
  DB.families=DB.families.filter(x=>x.id!==id);
  saveDB(DB); adminPage('families');
  showToast('משפחת '+f.name+' נמחקה');
}

function filterFamiliesAdmin(q){
  const filtered=DB.families.filter(f=>f.name.includes(q)||f.username.includes(q)||(f.members||'').includes(q));
  document.getElementById('fam-list').innerHTML=renderFamilyList(filtered);
}

function viewAsFamily(id){
  const f=DB.families.find(x=>x.id===id);
  if(!f)return;
  currentFamily=f;
  document.getElementById('user-avatar').textContent=f.name[0];
  document.getElementById('admin-shell').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  chatHistory=[{role:'ai',text:`שלום משפחת ${f.name}! אני העוזר הפיננסי האישי שלכם.`}];
  showPage('home');
  showToast('צופה בתור: משפחת '+f.name);
}

function showAddFamilyModal(){
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">➕ משפחה חדשה</div>
    <div class="field-group"><label class="field-label">שם משפחה</label><input class="field-input" id="nf-name" placeholder="כהן"></div>
    <div class="field-group"><label class="field-label">שם משתמש לכניסה</label><input class="field-input" id="nf-user" placeholder="cohen" dir="ltr"></div>
    <div class="field-group"><label class="field-label">סיסמה (4 ספרות)</label>
      <input class="field-input" type="password" id="nf-pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" style="text-align:center;font-size:22px;letter-spacing:8px">
    </div>
    <div class="field-group"><label class="field-label">סטטוס</label>
      <select class="field-input" id="nf-status"><option value="active">פעיל</option><option value="inactive">לא פעיל</option></select>
    </div>
    <button class="btn-primary" onclick="createFamily()">צור משפחה</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function editFamilyModal(id){
  const f=DB.families.find(x=>x.id===id);if(!f)return;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">✏️ עריכת משפחת ${f.name}</div>
    <div class="field-group"><label class="field-label">שם משתמש</label><input class="field-input" id="ef-user" value="${f.username}" dir="ltr"></div>
    <div class="field-group"><label class="field-label">סיסמה חדשה (ריק = ללא שינוי)</label>
      <input class="field-input" type="password" id="ef-pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" style="text-align:center;font-size:22px;letter-spacing:8px">
    </div>
    <div class="field-group"><label class="field-label">סטטוס</label>
      <select class="field-input" id="ef-status"><option value="active" ${f.status==='active'?'selected':''}>פעיל</option><option value="inactive" ${f.status==='inactive'?'selected':''}>לא פעיל</option></select>
    </div>
    <div class="field-group"><label class="field-label">ציון ידני (0-100)</label><input class="field-input" id="ef-score" type="number" min="0" max="100" value="${f.score}"></div>
    <button class="btn-primary" onclick="saveEditFamily('${id}')">שמור שינויים</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
  ['ep1','ep2','ep3','ep4'].forEach((id2,i,arr)=>{
    const el=document.getElementById(id2);if(!el)return;
    el.addEventListener('input',()=>{el.value=el.value.replace(/\D/g,'').slice(-1);if(el.value&&arr[i+1])document.getElementById(arr[i+1]).focus();});
    el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&arr[i-1])document.getElementById(arr[i-1]).focus();});
  });
}

function saveEditFamily(id){
  const f=DB.families.find(x=>x.id===id);if(!f)return;
  f.username=document.getElementById('ef-user').value.trim()||f.username;
  const newPin=(document.getElementById('ef-pin')?.value||'').replace(/\D/g,'');
  if(newPin.length===4)f.password=newPin;
  f.status=document.getElementById('ef-status').value;
  const scoreEl=document.getElementById('ef-score');
  if(scoreEl)f.score=parseInt(scoreEl.value)||f.score;
  saveDB(DB);closeModal();adminPage('families');showToast('✅ משפחה עודכנה בהצלחה');
}

function createFamily(){
  const name=document.getElementById('nf-name').value.trim();
  const user=document.getElementById('nf-user').value.trim();
  const pin=(document.getElementById('nf-pin')?.value||'').replace(/\D/g,'');
  const status=document.getElementById('nf-status').value;
  if(!name||!user){showToast('נא למלא שם ושם משתמש');return;}
  if(pin.length<4){showToast('נא להזין סיסמה של 4 ספרות');return;}
  if(DB.families.find(f=>f.username===user)){showToast('שם משתמש כבר קיים');return;}
  const newFam={
    id:'fam_'+Date.now(), name, username:user, password:pin, status,
    since:new Date().toLocaleDateString('he-IL',{month:'short',year:'numeric'}),
    members:'לקוח חדש', termsAccepted:false, onboardingDone:false,
    score:0, kpi:{income:0,expense:0,cashflow:0,balance:0},
    goals:[], tasks:[], budget:[], assets:[], docs:[],
    months:[], incomes:[], expenses:[],
    categories:[], messages:[],
  };
  DB.families.push(newFam);
  saveDB(DB);closeModal();adminPage('families');
  showToast(`✅ משפחת ${name} נוצרה! שם כניסה: ${user}`);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showNewGoalModal(){
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">🎯 יעד פיננסי חדש</div>
    <div class="field-group"><label class="field-label">שם היעד</label><input class="field-input" id="g-name" placeholder="קרן חירום, רכב, חופשה..."></div>
    <div class="field-group"><label class="field-label">סכום יעד (₪)</label><input class="field-input" id="g-amount" type="number" placeholder="50000"></div>
    <div class="field-group"><label class="field-label">תאריך יעד</label><input class="field-input" id="g-date" type="month"></div>
    <button class="btn-primary" onclick="createGoal()">הוסף יעד</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function createGoal(){
  const name=document.getElementById('g-name').value;
  const amount=parseInt(document.getElementById('g-amount').value)||0;
  const dateEl=document.getElementById('g-date');
  const date=dateEl&&dateEl.value?new Date(dateEl.value).toLocaleDateString('he-IL',{month:'short',year:'numeric'}):'?';
  if(!name||!amount){showToast('נא למלא שם וסכום');return;}
  currentFamily.goals.push({name,icon:'⭐',bg:'#fdf4ff',target:amount,current:0,date});
  saveDB(DB);closeModal();buildGoals();showToast('✅ יעד נוסף!');
}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.add('hidden');}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{if(t)t.style.display='none';},2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('adv-pass').addEventListener('keydown',e=>{if(e.key==='Enter')loginAdvisor();});
  tryAutoLogin();
});
</script>
</body>
